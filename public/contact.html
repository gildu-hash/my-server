<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — My Server</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .contact-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 2rem;
      margin-top: 2.5rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .contact-item:last-child { border-bottom: none; }

    .contact-icon {
      width: 40px;
      height: 40px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.15rem;
    }

    .contact-value {
      font-size: 0.95rem;
      color: #222;
      font-weight: 500;
      text-decoration: none;
    }

    .contact-value:hover { text-decoration: underline; }

    body.dark .contact-card {
      background: #1a1a1a;
      border-color: #2a2a2a;
    }

    body.dark .contact-item  { border-bottom-color: #2a2a2a; }
    body.dark .contact-icon  { background: #2a2a2a; }
    body.dark .contact-value { color: #e8e8e8; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">MyServer</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact" class="active">Contact</a></li>
    </ul>
    <button id="theme-toggle">🌙</button>
  </nav>

  <main>
    <h1>Contact</h1>
    <p>Have a question or just want to say hi? Here's where to find me.</p>

    <div class="contact-card">
      <div class="contact-item">
        <div class="contact-icon">✉️</div>
        <div>
          <div class="contact-label">Email</div>
          <a class="contact-value" href="mailto:hello@mysite.com">hello@mysite.com</a>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon">🐙</div>
        <div>
          <div class="contact-label">GitHub</div>
          <a class="contact-value" href="#">github.com/myusername</a>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon">🌐</div>
        <div>
          <div class="contact-label">Website</div>
          <a class="contact-value" href="#">mysite.com</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;

    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
      toggle.textContent = '☀️';
    }

    toggle.addEventListener('click', () => {
      const isDark = body.classList.toggle('dark');
      toggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
