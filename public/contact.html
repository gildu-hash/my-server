<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — My Server</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .page-grid {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 2rem;
      align-items: start;
      margin-top: 2.5rem;
    }

    /* ── Contact info ── */
    .contact-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .contact-item:last-child { border-bottom: none; }

    .contact-icon {
      width: 38px;
      height: 38px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .contact-label { font-size: 0.75rem; color: #999; margin-bottom: 0.1rem; }

    .contact-value {
      font-size: 0.9rem;
      color: #222;
      font-weight: 500;
      text-decoration: none;
    }

    .contact-value:hover { text-decoration: underline; }

    /* ── Form ── */
    .form-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.75rem;
    }

    .form-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: #111;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 0.35rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.925rem;
      font-family: inherit;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: none;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
      background: #fff;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: #bbb; }

    .field .field-error {
      font-size: 0.78rem;
      color: #c0392b;
      margin-top: 0.35rem;
      min-height: 1rem;
    }

    .field input.invalid,
    .field textarea.invalid { border-color: #e74c3c; }

    .btn-submit {
      width: 100%;
      padding: 0.7rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #ccc; cursor: default; }

    /* ── Success state ── */
    .success-msg {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
    }

    .success-msg .check-circle {
      width: 48px;
      height: 48px;
      background: #111;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.25rem;
      color: #fff;
    }

    .success-msg h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
    .success-msg p  { font-size: 0.875rem; color: #888; }

    .btn-reset {
      margin-top: 1rem;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: background 0.15s;
    }

    .btn-reset:hover { background: #f5f5f5; }

    /* ── Dark mode ── */
    body.dark .contact-card,
    body.dark .form-card { background: #1a1a1a; border-color: #2a2a2a; }

    body.dark .form-card h2 { color: #f0f0f0; }
    body.dark .contact-item { border-bottom-color: #2a2a2a; }
    body.dark .contact-icon { background: #2a2a2a; }
    body.dark .contact-value { color: #e8e8e8; }
    body.dark .field label { color: #888; }

    body.dark .field input,
    body.dark .field textarea {
      background: #111;
      border-color: #2a2a2a;
      color: #e8e8e8;
    }

    body.dark .field input:focus,
    body.dark .field textarea:focus {
      border-color: #aaa;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
      background: #1a1a1a;
    }

    body.dark .field input::placeholder,
    body.dark .field textarea::placeholder { color: #444; }

    body.dark .btn-submit { background: #e8e8e8; color: #111; }
    body.dark .btn-submit:hover { background: #fff; }
    body.dark .btn-submit:disabled { background: #333; color: #666; }

    body.dark .success-msg .check-circle { background: #e8e8e8; color: #111; }
    body.dark .success-msg p { color: #666; }
    body.dark .btn-reset { border-color: #2a2a2a; color: #aaa; }
    body.dark .btn-reset:hover { background: #2a2a2a; }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      .page-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">MyServer</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact" class="active">Contact</a></li>
    </ul>
    <button id="theme-toggle">🌙</button>
  </nav>

  <main>
    <h1>Contact</h1>
    <p>Have a question or just want to say hi?</p>

    <div class="page-grid">

      <div class="contact-card">
        <div class="contact-item">
          <div class="contact-icon">✉️</div>
          <div>
            <div class="contact-label">Email</div>
            <a class="contact-value" href="mailto:hello@mysite.com">hello@mysite.com</a>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">🐙</div>
          <div>
            <div class="contact-label">GitHub</div>
            <a class="contact-value" href="#">github.com/myusername</a>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">🌐</div>
          <div>
            <div class="contact-label">Website</div>
            <a class="contact-value" href="#">mysite.com</a>
          </div>
        </div>
      </div>

      <div class="form-card">
        <h2>Send a message</h2>

        <form id="contact-form" novalidate>
          <div class="field">
            <label for="f-name">Name</label>
            <input type="text" id="f-name" placeholder="Jane Smith" autocomplete="name">
            <div class="field-error" id="err-name"></div>
          </div>
          <div class="field">
            <label for="f-email">Email</label>
            <input type="email" id="f-email" placeholder="jane@example.com" autocomplete="email">
            <div class="field-error" id="err-email"></div>
          </div>
          <div class="field">
            <label for="f-message">Message</label>
            <textarea id="f-message" rows="5" placeholder="What's on your mind?"></textarea>
            <div class="field-error" id="err-message"></div>
          </div>
          <button type="submit" class="btn-submit">Send message</button>
        </form>

        <div class="success-msg" id="success-msg">
          <div class="check-circle">✓</div>
          <h3>Message sent!</h3>
          <p>Thanks for reaching out. I'll get back to you soon.</p>
          <button class="btn-reset" id="btn-reset">Send another</button>
        </div>
      </div>

    </div>
  </main>

  <script>
    /* ── Form validation & submit ── */
    const form    = document.getElementById('contact-form');
    const success = document.getElementById('success-msg');

    function validate() {
      const name    = document.getElementById('f-name');
      const email   = document.getElementById('f-email');
      const message = document.getElementById('f-message');
      let ok = true;

      function setError(input, errId, msg) {
        const errEl = document.getElementById(errId);
        if (msg) {
          errEl.textContent = msg;
          input.classList.add('invalid');
          ok = false;
        } else {
          errEl.textContent = '';
          input.classList.remove('invalid');
        }
      }

      setError(name, 'err-name',
        !name.value.trim() ? 'Please enter your name.' : null);

      const emailVal = email.value.trim();
      setError(email, 'err-email',
        !emailVal                          ? 'Please enter your email.' :
        !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal) ? 'Please enter a valid email.' : null);

      setError(message, 'err-message',
        !message.value.trim() ? 'Please enter a message.' : null);

      return ok;
    }

    // Clear error on input
    ['f-name', 'f-email', 'f-message'].forEach(id => {
      document.getElementById(id).addEventListener('input', function () {
        document.getElementById('err-' + id.slice(2)).textContent = '';
        this.classList.remove('invalid');
      });
    });

    form.addEventListener('submit', e => {
      e.preventDefault();
      if (!validate()) return;

      const btn = form.querySelector('.btn-submit');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      // Simulate a network request
      setTimeout(() => {
        form.style.display = 'none';
        success.style.display = 'block';
      }, 800);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      form.reset();
      form.style.display = '';
      success.style.display = 'none';
      const btn = form.querySelector('.btn-submit');
      btn.disabled = false;
      btn.textContent = 'Send message';
    });

    /* ── Dark mode ── */
    const toggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      const dark = document.body.classList.toggle('dark');
      toggle.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
