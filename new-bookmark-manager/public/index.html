<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    main {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.92rem;
      margin-bottom: 1.75rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.75rem;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 0.35rem;
    }

    input, select {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, select:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
      background: #fff;
    }

    input::placeholder { color: #bbb; }

    .btn-submit {
      width: 100%;
      padding: 0.7rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.4rem;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: #333; }

    #btn-cancel {
      width: 100%;
      padding: 0.65rem;
      background: none;
      color: #555;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      display: none;
      transition: background 0.15s;
    }

    #btn-cancel:hover { background: #f5f5f5; }

    /* ── Saved list ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 2rem 0 1rem;
    }

    .list-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #555;
    }

    .count-badge {
      background: #f0f0f0;
      color: #666;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
    }

    #bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .bookmark-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .bookmark-item.editing {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .bookmark-info { flex: 1; min-width: 0; }

    .bookmark-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-title:hover { text-decoration: underline; }

    .bookmark-url {
      font-size: 0.78rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.1rem;
    }

    .category-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      background: #f0f0f0;
      color: #555;
      flex-shrink: 0;
    }

    .btn-edit,
    .btn-delete {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0.25rem 0.45rem;
      cursor: pointer;
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .btn-edit:hover {
      color: #1e6fb8;
      border-color: #cfe2f3;
      background: #f4f8fc;
    }

    .btn-delete:hover {
      color: #c0392b;
      border-color: #f5c6c6;
      background: #fff5f5;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #bbb;
    }

    .empty-state .icon { font-size: 2.25rem; margin-bottom: 0.6rem; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <h1>Bookmark Manager</h1>
    <p class="subtitle">Save a link with a title and category.</p>

    <div class="card">
      <form id="bookmark-form" method="post" action="/bookmarks">
        <div class="field">
          <label for="f-url">URL</label>
          <input type="text" id="f-url" name="url" placeholder="example.com" required autocomplete="off">
        </div>

        <div class="field">
          <label for="f-title">Title</label>
          <input type="text" id="f-title" name="title" placeholder="My favorite site" required autocomplete="off">
        </div>

        <div class="field">
          <label for="f-category">Category</label>
          <select id="f-category" name="category" required>
            <option value="" disabled selected>Choose a category…</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="learning">Learning</option>
            <option value="entertainment">Entertainment</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit" class="btn-submit">Save bookmark</button>
        <button type="button" id="btn-cancel">Cancel edit</button>
      </form>
    </div>

    <div class="list-header">
      <h2>Saved</h2>
      <span class="count-badge" id="count-badge">0</span>
    </div>
    <div id="bookmark-list"></div>
  </main>

  <script>
    const STORAGE_KEY = 'bookmarks';
    const form        = document.getElementById('bookmark-form');
    const urlInput    = document.getElementById('f-url');
    const titleInput  = document.getElementById('f-title');
    const catInput    = document.getElementById('f-category');
    const listEl      = document.getElementById('bookmark-list');
    const badge       = document.getElementById('count-badge');
    const submitBtn   = form.querySelector('.btn-submit');
    const cancelBtn   = document.getElementById('btn-cancel');

    let editingIndex = null;

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(bookmarks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return '';
      return /^https?:\/\//i.test(trimmed) ? trimmed : 'https://' + trimmed;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function startEdit(index) {
      const bookmarks = load();
      const b = bookmarks[index];
      if (!b) return;
      editingIndex = index;
      urlInput.value = b.url;
      titleInput.value = b.title;
      catInput.value = b.category;
      submitBtn.textContent = 'Update bookmark';
      cancelBtn.style.display = 'block';
      render();
      urlInput.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
      editingIndex = null;
      form.reset();
      submitBtn.textContent = 'Save bookmark';
      cancelBtn.style.display = 'none';
      render();
    }

    function handleDelete(index) {
      const bookmarks = load();
      bookmarks.splice(index, 1);
      save(bookmarks);
      if (editingIndex !== null) {
        if (editingIndex === index) {
          cancelEdit();
          return;
        }
        if (editingIndex > index) editingIndex--;
      }
      render();
    }

    function render() {
      const bookmarks = load();
      badge.textContent = bookmarks.length;

      if (bookmarks.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔖</div>
            <p>No bookmarks yet. Add one above.</p>
          </div>`;
        return;
      }

      listEl.innerHTML = bookmarks.map((b, i) => {
        const editingClass = editingIndex === i ? ' editing' : '';
        return `
          <div class="bookmark-item${editingClass}">
            <div class="bookmark-info">
              <a class="bookmark-title" href="${escapeHtml(b.url)}" target="_blank" rel="noopener">${escapeHtml(b.title)}</a>
              <div class="bookmark-url">${escapeHtml(b.url)}</div>
            </div>
            <span class="category-badge">${escapeHtml(b.category)}</span>
            <button class="btn-edit" data-action="edit" data-index="${i}" title="Edit">✎</button>
            <button class="btn-delete" data-action="delete" data-index="${i}" title="Delete">✕</button>
          </div>`;
      }).join('');

      listEl.querySelectorAll('[data-action]').forEach(btn => {
        const i = Number(btn.dataset.index);
        if (btn.dataset.action === 'edit') {
          btn.addEventListener('click', () => startEdit(i));
        } else {
          btn.addEventListener('click', () => handleDelete(i));
        }
      });
    }

    // Auto-complete the URL on blur
    urlInput.addEventListener('blur', () => {
      const normalized = normalizeUrl(urlInput.value);
      if (normalized) urlInput.value = normalized;
    });

    form.addEventListener('submit', e => {
      e.preventDefault();
      const url      = normalizeUrl(urlInput.value);
      const title    = titleInput.value.trim();
      const category = catInput.value;
      if (!url || !title || !category) return;

      const bookmarks = load();
      if (editingIndex !== null) {
        const original = bookmarks[editingIndex];
        bookmarks[editingIndex] = { ...original, url, title, category, updatedAt: Date.now() };
        editingIndex = null;
        submitBtn.textContent = 'Save bookmark';
        cancelBtn.style.display = 'none';
      } else {
        bookmarks.unshift({ url, title, category, addedAt: Date.now() });
      }
      save(bookmarks);

      form.reset();
      render();
    });

    cancelBtn.addEventListener('click', cancelEdit);

    render();
  </script>
</body>
</html>
